
    <p-fluid>
        <div class="flex flex-col md:flex-row gap-8">
        <div class="md:w-1/2">
            <div class="card flex flex-col gap-4">
<!--                <div class="font-semibold text-xl">Facture</div>-->
                <div class="flex flex-col md:flex-row gap-4">
                    <p-floatlabel variant="on">
                        <input pInputText id="numfact"  placeholder="N°"  [disabled]="true" class="flex-1 w-full" />
                        <label for="numfact">Fact N°</label>
                    </p-floatlabel>
                    <p-floatlabel variant="on">
                        <p-datepicker [(ngModel)]="date"  id="on_date"   [disabled]="true"  class="flex-1 w-full" />
                        <label for="on_date">Date</label>
                    </p-floatlabel>
                    <p-floatlabel variant="on">
                        <p-select id="typeprix" [(ngModel)]="dropdownItem" [options]="dropdownItems" optionValue="value"  optionLabel="name"  class="flex-1 w-full" ></p-select>
                        <label for="typeprix">Tarif</label>
                    </p-floatlabel>
                </div>
            </div>
        </div>

        <div class="md:w-1/2">
                <div class="card flex flex-col gap-4">
                    <div class="flex flex-col md:flex-row gap-4">
                       <p-autocomplete  id="prenom" [(ngModel)]="selectedClients" class="flex-1 w-full" placeholder="Client" [suggestions]="filteredClients" (completeMethod)="searchByName($event)" optionLabel="lastname" />
                    </div>

                </div>

        </div>
        </div>

<!--        <br>-->
    </p-fluid>
<!--<div class="flex items-start gap-3">-->
        <p-tabs value="0" >
            <p-tablist>
                <p-tab value="0">Description</p-tab>
                <p-tab value="1">Consignation</p-tab>
            </p-tablist>
            <p-tabpanels>
                <p-tabpanel value="0">
                    <p-table
                        #dt
                        [scrollable]="true"
                        scrollHeight="800px"
                        [value]="listArticles"
                        [rows]="50"
                        [columns]="cols"
                        [size]="'small'"
                        [globalFilterFields]="['firstName', 'lastname', 'email', 'addresse']"
                        [tableStyle]="{ 'min-width': '75rem' }"
                        [(selection)]="selectedArticle"
                        [rowHover]="true"
                        dataKey="id"
                        (onEditInit)="onEditInit($event)"
                        editMode="cell"
                        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} articles"
                        [showCurrentPageReport]="true"
                        [rowsPerPageOptions]="[10, 20, 30]"
                    >

                        <ng-template #header>
                            <tr>
                                <th style="width: 3rem">
                                    <p-tableHeaderCheckbox />
                                </th>
                                <th style="min-width: 5rem">ID</th>
                                <th pSortableColumn="firstName" style="min-width:16rem">
                                    Articles
                                    <p-sortIcon field="firstName" />
                                </th>
                                <!-- <th>Image</th> -->
                                <th pSortableColumn="cageot" style="min-width: 8rem">
                                    Cageot
                                    <p-sortIcon field="Cageot" />
                                </th>
                                <th pSortableColumn="piece" style="min-width:10rem">
                                    Pièce
                                    <p-sortIcon field="piece" />
                                </th>
                                <th pSortableColumn="unitaire" style="min-width:10rem">
                                    Prix Unitaire
                                    <p-sortIcon field="unitaire" />
                                </th>

                                <th pSortableColumn="prixarticle" style="min-width: 12rem">
                                    Prix Articles
                                    <p-sortIcon field="prixarticle" />
                                </th>
                                <th pSortableColumn="prixbtl" style="min-width: 12rem">
                                    Prix Btl
                                    <p-sortIcon field="prixarticle" />
                                </th>
                                <th style="min-width: 12rem"></th>
                            </tr>
                        </ng-template>
                        <ng-template #caption>
                            <div class="flex justify-between items-center">
                                <!--                                <h3 class="text-lg font-semibold">Liste des clients</h3>-->

                                <div class="flex gap-2">
                                    <p-floatlabel variant="on">
                                        <p-autocomplete   id="nameArticle" [(ngModel)]="nameArticle" fluid  [pAutoFocus]="true"  [suggestions]="filteredArticles" required (completeMethod)="filterArticleByName($event)" optionLabel="name" />
                                        <label for="nameArticle">Article</label>
                                    </p-floatlabel>

                                    <p-button label="Créer" icon="pi pi-plus" class="mr-2" (onClick)="AddFacture()" />
                                    <p-button severity="danger" label="Delete" icon="pi pi-trash" outlined (onClick)="deleteSelectedProducts()" [disabled]="!selectedArticle || !selectedArticle.length" />

                                    <p-toast />
                                </div>

                            </div>
                        </ng-template>
                        <ng-template #body let-article let-i="rowIndex">
                            <tr>
                                <td style="width: 3rem">
                                     <p-tableCheckbox [value]="article" />
                                </td>
                                <td style="min-width: 5rem">
                                    {{i}}
                                    <!--                        <input type="text" pInputText id="name" [(ngModel)]="article.name"  />-->
                                </td>
                                <td style="min-width: 16rem">
                                    {{article.name}}
                                </td>

                                <td [pEditableColumn]="article.emballage.cageot" pEditableColumnField="cageot" style="min-width: 16rem">
                                    <p-cellEditor >
                                        <ng-template #input>
                                            <p-inputnumber
                                                #monChampInputNumber
                                                focused
                                                inputId="inputCgt"
                                                [(ngModel)]="article.emballage.cageot"
                                                (onInput)="onCalcul(article.emballage.cageot, article)"
                                                fluid />


                                        </ng-template>
                                        <ng-template #output>
                                            {{ article.emballage.cageot }}
                                        </ng-template>
                                    </p-cellEditor>
                                </td>
                                <td [pEditableColumn]="article.emballage.piece" pEditableColumnField="piece" style="min-width: 16rem">
                                    <p-cellEditor>
                                        <ng-template #input>
<!--                                            <p-inputnumber-->
<!--                                                [(ngModel)]="article.tempPiece"-->
<!--                                                (blur)="onBlurCalculPiece(article)"-->
<!--                                                (onInput)="onCalculePrixArticle(article)"-->
<!--                                                fluid />-->

                                            <input
                                                pInputText
                                                type="text"
                                                [(ngModel)]="article.tempPiece"
                                                (blur)="onBlurCalculPiece(article)"
                                                (input)="onCalculePrixArticle(article)"
                                                fluid />



                                        </ng-template>
                                        <ng-template #output>
                                            {{ article.tempPiece }}
                                        </ng-template>
                                    </p-cellEditor>

                                </td>
                                <td >
                                    {{ formatMontant(getPrix(article)) }}
                                </td>
                                <td>
                                    {{formatMontant(article.prixArticle)}}

                                </td>
                                <td>
                                    {{article.prixBtl}}
                                </td>
                                <td>
<!--                                    <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true"  />-->
<!--                                    <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true"  />-->
                                </td>
                            </tr>
                        </ng-template>
                        <ng-template #footer>
                            <tr>
                                <td colspan="3" class="text-right font-bold p-3 pb-0">Totals</td>
                                <td class="font-bold p-3 pb-0">25000</td>
                                <td class="font-bold p-3 pb-0">3000</td>
                            </tr>
                        </ng-template>
                    </p-table>

                </p-tabpanel>
                <p-tabpanel value="1">
                </p-tabpanel>

            </p-tabpanels>

        </p-tabs>

    <p-dialog [(visible)]="pDialog" [style]="{width: '550px', height: '500px' }"   header="Recherche articles" [modal]="true" [resizable]="false">

        <ng-template #content>
                <div class="flex flex-col gap-6 my-fixed-tabs">
                    <div>
                        <label for="nameArticle" class="block font-bold mb-3">Article</label>
                        <!--                    <input type="text" pInputText id="firstName" [(ngModel)]="client.firstName" required autofocus fluid />-->
                        <p-autocomplete   id="nameArticle" [(ngModel)]="nameArticle" fluid  [pAutoFocus]="true"  [suggestions]="filteredArticles" required (completeMethod)="filterArticleByName($event)" optionLabel="name" />

                    </div>
<!--                    <div class="card flex justify-center">-->
<!--                        <p-listbox [options]="conditionnement"  [(ngModel)]="cndtSelected"  optionLabel="name" class="w-full md:w-56" />-->
<!--                    </div>-->
                </div>



        </ng-template>

        <ng-template #footer>
            <p-button label="Cancel" icon="pi pi-times" text (click)="hideDialog()" />
            <p-button label="Save" icon="pi pi-check" (click)="AddFacture()" />
        </ng-template>

    </p-dialog>

<!--    <p-confirmdialog [style]="{ width: '450px' }" />-->
